# ── Video source ─────────────────────────────────────────────────────────────
# source: int (USB device), RTSP URL, or file path
# Examples:
#   source: 0                                   # first USB webcam
#   source: "rtsp://192.168.1.50:554/stream"    # WiFi/IP camera
#   source: "demo/scenario_a.mp4"               # pre-recorded file
source: 0
target_fps: 15.0

# ── Homography ────────────────────────────────────────────────────────────────
# Path to calibration file produced by tools/calibrate_homography.py
# Set to null to use the mock identity homography (for --mock mode)
homography_file: "config/homography.npy"

# ── Mock mode ────────────────────────────────────────────────────────────────
mock:
  enabled: false     # override with --mock flag or set true here for dev

# ── Area of Interest (AOI) ───────────────────────────────────────────────────
# Restrict detection + safety logic to a zone (e.g. the walkway + the middle two
# rows of cars). Improves small-object recall (crop_zoom) AND sharpens the STL
# signal by dropping irrelevant person↔vehicle pairs. Geometry-safe: detections
# are remapped to full-frame coords, so depth/intrinsics are untouched.
#
# polygon: normalised [x, y] points in 0..1 (image top-left origin). The outline
# is drawn on the dashboard/preview so you can eyeball and tune it to your view.
# The default is a centred trapezoid — ADJUST to your camera's walkway/rows.
aoi:
  enabled: true
  crop_zoom: false   # filter-only: thin lane band would clip tall cars if cropped;
                     # detect on full frame, then keep objects with feet in the zone
  pad: 0.08
  polygon:           # active lane zone (webcam FOV) — pedestrians + moving cars
    - [0.347, 0.696]
    - [0.762, 0.696]
    - [0.601, 0.586]
    - [0.503, 0.591]
