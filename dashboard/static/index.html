<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeEdge — Car Park Safety Monitor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: grid; grid-template-rows: 56px 1fr; }
  header { background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; padding: 0 24px; gap: 16px; }
  header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.05em; color: #58a6ff; }
  #level-badge { padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; background: #00c853; color: #000; transition: background 0.3s; }
  #conn-dot { width: 8px; height: 8px; border-radius: 50%; background: #3d4148; margin-left: auto; }
  #conn-dot.live { background: #00c853; }

  main { display: grid; grid-template-columns: 1fr 340px; grid-template-rows: 1fr 200px; gap: 1px; background: #30363d; overflow: hidden; }
  section { background: #0d1117; padding: 16px; overflow: hidden; }

  /* Camera feed */
  #feed-panel { position: relative; }
  #feed { width: 100%; height: 100%; object-fit: contain; background: #000; border-radius: 4px; }

  /* Robustness panel */
  #rho-panel { display: flex; flex-direction: column; gap: 12px; }
  #rho-panel h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #8b949e; margin-bottom: 4px; }
  .rho-row { display: flex; flex-direction: column; gap: 4px; }
  .rho-label { font-size: 0.72rem; color: #8b949e; display: flex; justify-content: space-between; }
  .rho-label span { font-weight: 600; }
  .rho-bar-bg { background: #21262d; border-radius: 3px; height: 8px; overflow: hidden; }
  .rho-bar { height: 100%; border-radius: 3px; transition: width 0.1s, background 0.3s; min-width: 2px; }

  /* Event log */
  #log-panel { grid-column: 1 / 3; border-top: 1px solid #30363d; }
  #log-panel h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #8b949e; margin-bottom: 8px; }
  #event-log { display: flex; flex-direction: column; gap: 4px; max-height: 140px; overflow-y: auto; }
  .log-entry { font-size: 0.72rem; padding: 4px 8px; border-radius: 3px; border-left: 3px solid #30363d; background: #161b22; display: flex; gap: 12px; }
  .log-entry.level-1 { border-color: #ffd600; }
  .log-entry.level-2 { border-color: #ff6d00; }
  .log-entry.level-3 { border-color: #d50000; background: #1f1013; }
  .log-time { color: #8b949e; flex-shrink: 0; }
  .log-msg  { color: #e6edf3; }
</style>
</head>
<body>
<header>
  <h1>SafeEdge ◆ Car Park Safety Monitor</h1>
  <div id="level-badge">CONNECTING...</div>
  <div id="conn-dot"></div>
</header>
<main>
  <section id="feed-panel">
    <img id="feed" alt="Camera feed">
  </section>

  <section id="rho-panel">
    <h2>STL Robustness (ρ)</h2>
    <div class="rho-row" id="row-rho1">
      <div class="rho-label">φ1 Minimum Separation <span id="val-rho1">—</span></div>
      <div class="rho-bar-bg"><div class="rho-bar" id="bar-rho1"></div></div>
    </div>
    <div class="rho-row" id="row-rho2">
      <div class="rho-label">φ2 Speed-Proximity Coupling <span id="val-rho2">—</span></div>
      <div class="rho-bar-bg"><div class="rho-bar" id="bar-rho2"></div></div>
    </div>
    <div class="rho-row" id="row-rho3">
      <div class="rho-label">φ3 Predictive Near-Miss <span id="val-rho3">—</span></div>
      <div class="rho-bar-bg"><div class="rho-bar" id="bar-rho3"></div></div>
    </div>
    <div class="rho-row" id="row-rho4">
      <div class="rho-label">φ4 Emergency Stop Compliance <span id="val-rho4">—</span></div>
      <div class="rho-bar-bg"><div class="rho-bar" id="bar-rho4"></div></div>
    </div>
    <div class="rho-row" id="row-rho5">
      <div class="rho-label">φ5 Post-Alert Clearance <span id="val-rho5">—</span></div>
      <div class="rho-bar-bg"><div class="rho-bar" id="bar-rho5"></div></div>
    </div>

    <div style="margin-top:12px; border-top:1px solid #30363d; padding-top:12px;">
      <h2>Live Signals</h2>
      <div style="font-size:0.78rem; display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:8px;">
        <div style="color:#8b949e">d_min <span id="sig-dmin" style="color:#e6edf3">—</span> m</div>
        <div style="color:#8b949e">v_veh <span id="sig-vveh" style="color:#e6edf3">—</span> m/s</div>
        <div style="color:#8b949e">d_pred <span id="sig-dpred" style="color:#e6edf3">—</span> m</div>
        <div style="color:#8b949e">scale <span id="sig-scale" style="color:#e6edf3">—</span></div>
      </div>
    </div>
  </section>

  <section id="log-panel">
    <h2>Event Log</h2>
    <div id="event-log"></div>
  </section>
</main>

<script>
const LEVEL_COLOURS = {0:"#00c853",1:"#ffd600",2:"#ff6d00",3:"#d50000"};
const RHO_MAX = 8.0;

function rhoColour(v) {
  if (v === null) return "#3d4148";
  if (v < 0)   return "#d50000";
  if (v < 1.0) return "#ff6d00";
  if (v < 3.0) return "#ffd600";
  return "#00c853";
}

function rhoWidth(v) {
  if (v === null) return "0%";
  return Math.min(100, Math.max(2, (v / RHO_MAX) * 100)) + "%";
}

function updateRho(id, v) {
  const val = document.getElementById("val-" + id);
  const bar = document.getElementById("bar-" + id);
  val.textContent = v !== null ? v.toFixed(3) : "n/a";
  bar.style.width = rhoWidth(v);
  bar.style.background = rhoColour(v);
}

function onMessage(data) {
  const badge = document.getElementById("level-badge");
  badge.textContent = data.level_label;
  badge.style.background = data.level_colour;
  badge.style.color = data.level <= 1 ? "#000" : "#fff";

  document.getElementById("feed").src = "data:image/jpeg;base64," + data.frame;

  updateRho("rho1", data.rho.rho1);
  updateRho("rho2", data.rho.rho2);
  updateRho("rho3", data.rho.rho3);
  updateRho("rho4", data.rho.rho4);
  updateRho("rho5", data.rho.rho5);

  document.getElementById("sig-dmin").textContent  = data.signals.d_min.toFixed(2);
  document.getElementById("sig-vveh").textContent  = data.signals.v_veh_max.toFixed(2);
  document.getElementById("sig-dpred").textContent = data.signals.d_pred.toFixed(2);
  document.getElementById("sig-scale").textContent = data.scale_factor.toFixed(2);

  if (data.event) addLogEntry(data.event);
}

function addLogEntry(evt) {
  const log = document.getElementById("event-log");
  const ts = new Date().toLocaleTimeString();
  const div = document.createElement("div");
  div.className = "log-entry level-" + evt.level;
  div.innerHTML = `<span class="log-time">${ts}</span><span class="log-msg">${evt.message}</span>`;
  log.prepend(div);
  if (log.children.length > 50) log.lastChild.remove();
}

function connect() {
  const dot = document.getElementById("conn-dot");
  const ws = new WebSocket("ws://" + location.host + "/ws");

  ws.onopen = () => { dot.classList.add("live"); setInterval(() => ws.send("ping"), 20000); };
  ws.onclose = () => { dot.classList.remove("live"); setTimeout(connect, 2000); };
  ws.onmessage = (e) => onMessage(JSON.parse(e.data));
}

connect();
</script>
</body>
</html>
